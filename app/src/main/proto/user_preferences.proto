syntax = "proto3";

import "auth_status.proto";
import "onboarding_status.proto";
import "role_status.proto";

option java_package = "bob.colbaskin.umir_hack_2.datastore";
option java_multiple_files = true;

message UserPreferencesProto {
  RoleStatus roleStatus = 1;
  OnboardingStatus onboardingStatus = 2;
  AuthStatus authStatus = 3;
}
